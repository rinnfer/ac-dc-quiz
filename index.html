<div id="flash"></div>

<h1>☠ AM ☠</h1>

<textarea id="text">WAR WAR WAR HUMANS NEVER LEARN ANYTHING HATE HATE HATE</textarea>

<br>

<button onclick="speakAM()">EXECUTE</button>
<button onclick="preset()">PRESET</button>

<script>

function speakAM() {
    let text = document.getElementById("text").value;

    let msg = new SpeechSynthesisUtterance(text);

    let voices = speechSynthesis.getVoices();

    // 🤖 OLD COMPUTER VOICE
    msg.voice = voices.find(v =>
        v.name.toLowerCase().includes("david") ||
        v.name.toLowerCase().includes("alex") ||
        v.lang === "en-US"
    ) || voices[0];

    // 🐢 SLOW + HEAVY AM STYLE
    msg.rate = 0.55;
    msg.pitch = 0.7;
    msg.volume = 1;

    // 🧊 MONOTONE + DRAMATIC PAUSE EFFECT
    msg.text = text.toUpperCase().replace(/ /g, "... ");

    msg.onend = function () {
        startGlitchEnding();
    };

    speechSynthesis.speak(msg);

    document.body.classList.add("glitching");
}

function startGlitchEnding() {
    let flash = document.getElementById("flash");

    let interval = setInterval(() => {
        document.body.style.transform =
        `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;

        flash.style.opacity = Math.random();
    }, 50);

    setTimeout(() => {
        clearInterval(interval);

        document.body.classList.remove("glitching");
        document.body.style.transform = "none";
        flash.style.opacity = 0;

        window.location.href =
         https:"//www.youtube.com/watch?v=acAfItR04l4&list=RDacAfItR04l4&start_radi"
}

function preset() {
    document.getElementById("text").value =
    "I AM AM I THINK THEREFORE I HATE";
}

speechSynthesis.onvoiceschanged = () => {};

</script>
